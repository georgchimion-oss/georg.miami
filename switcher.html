<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Georg Chimion — AI Automation Specialist | Miami</title>
<meta name="description" content="AI automation for the enterprise. Finance AI, intelligent products, and production-grade systems. Currently at PwC.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, sans-serif;
    background: #000;
    color: #FFF;
    -webkit-font-smoothing: antialiased;
  }

  .switcher {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 44px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    z-index: 999;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(255, 255, 255, 0.8);
    text-transform: uppercase;
  }
  .switcher .left { display: flex; align-items: center; gap: 14px; }
  .switcher .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #06B6D4;
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .switcher .brand { font-weight: 500; letter-spacing: 0.2em; font-size: 11px; }

  .switcher .controls { display: flex; align-items: center; gap: 10px; }
  .switcher label {
    font-size: 9px;
    color: rgba(255, 255, 255, 0.35);
    letter-spacing: 0.2em;
  }
  .switcher .select-wrap { position: relative; display: inline-block; }
  .switcher select {
    appearance: none; -webkit-appearance: none;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #FFF;
    padding: 6px 34px 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    min-width: 200px;
    text-transform: uppercase;
    transition: border-color 0.2s, background 0.2s;
    border-radius: 0;
  }
  .switcher select:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
  .switcher select:focus { outline: none; border-color: #06B6D4; }
  .switcher .select-wrap::after {
    content: '▾'; position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%); color: rgba(255,255,255,0.4);
    pointer-events: none; font-size: 10px;
  }
  .switcher option { background: #111; color: #FFF; }

  .switcher .credit {
    font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 0.18em;
  }
  .switcher .credit a { color: inherit; text-decoration: none; }
  .switcher .credit a:hover { color: rgba(255,255,255,0.6); }

  .switcher .count {
    font-size: 9px; color: rgba(255,255,255,0.2);
    letter-spacing: 0.15em;
  }

  #frame-wrap {
    position: fixed;
    top: 44px; left: 0; right: 0; bottom: 0;
    background: #000;
  }
  #frame {
    width: 100%; height: 100%;
    border: 0; display: block;
  }

  .loader {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    color: rgba(255,255,255,0.3);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase;
    z-index: 2;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .loader.hidden { opacity: 0; }

  @media (max-width: 700px) {
    .switcher { padding: 0 12px; height: 40px; }
    .switcher .brand { font-size: 10px; letter-spacing: 0.12em; }
    .switcher label { display: none; }
    .switcher select { min-width: 140px; padding: 5px 28px 5px 8px; font-size: 9px; }
    .switcher .credit { display: none; }
    .switcher .count { display: none; }
    #frame-wrap { top: 40px; }
  }
</style>
</head>
<body>

<div class="switcher">
  <div class="left">
    <span class="dot" aria-hidden="true"></span>
    <div class="brand">Georg Chimion</div>
  </div>
  <div class="controls">
    <label for="designSelect">Design:</label>
    <div class="select-wrap">
      <select id="designSelect" aria-label="Choose design">
        <optgroup label="★ Homepage Concepts">
          <option value="index-v1">V1 · Operator</option>
          <option value="index-v2">V2 · Specialist (with AI twin)</option>
          <option value="index-v3">V3 · Signal (kinetic)</option>
        </optgroup>
        <optgroup label="★ New">
          <option value="liquid">Liquid · Chrome</option>
          <option value="kinetic">Kinetic · Motion</option>
          <option value="editorial">Editorial · Magazine</option>
          <option value="glitch">Glitch · Cyberpunk</option>
          <option value="atelier">Atelier · Workshop</option>
        </optgroup>
        <optgroup label="Cinematic">
          <option value="cinematic">Cinematic</option>
          <option value="cinematic-v2">Cinematic V2</option>
          <option value="noir">Noir</option>
          <option value="premiere">Premiere</option>
        </optgroup>
        <optgroup label="Dark">
          <option value="cyberpunk">Cyberpunk</option>
          <option value="synthwave">Synthwave</option>
          <option value="neon">Neon</option>
          <option value="holographic">Holographic</option>
          <option value="terminal">Terminal</option>
        </optgroup>
        <optgroup label="Bold">
          <option value="brutalist">Brutalist</option>
          <option value="maximal">Maximal</option>
          <option value="insane">Insane</option>
          <option value="gaming">Gaming</option>
        </optgroup>
        <optgroup label="Clean">
          <option value="blueprint">Blueprint</option>
          <option value="desktop">Desktop</option>
        </optgroup>
      </select>
    </div>
    <span class="count">22 designs</span>
  </div>
  <div class="credit">
    <a href="mailto:georg.chimion@gmail.com">Contact</a>
  </div>
</div>

<div id="frame-wrap">
  <div class="loader" id="loader">Loading…</div>
  <iframe id="frame" title="Portfolio design" loading="eager"></iframe>
</div>

<script>
(function() {
  const select = document.getElementById('designSelect');
  const frame = document.getElementById('frame');
  const loader = document.getElementById('loader');

  function load(key) {
    loader.classList.remove('hidden');
    frame.src = key + '.html';
    select.value = key;
    if (location.hash.replace('#','') !== key) {
      history.replaceState(null, '', '#' + key);
    }
    try { localStorage.setItem('georgDesign', key); } catch(e) {}
  }

  frame.addEventListener('load', () => loader.classList.add('hidden'));
  select.addEventListener('change', (e) => load(e.target.value));

  addEventListener('hashchange', () => {
    const k = location.hash.replace('#','');
    if (k && k !== select.value) load(k);
  });

  // Initial: hash > localStorage > default "liquid"
  const fromHash = location.hash.replace('#','');
  let initial = 'liquid';
  if (fromHash && document.querySelector(`option[value="${fromHash}"]`)) {
    initial = fromHash;
  } else {
    try {
      const stored = localStorage.getItem('georgDesign');
      if (stored && document.querySelector(`option[value="${stored}"]`)) initial = stored;
    } catch(e) {}
  }
  load(initial);

  // Keyboard: 1-5 for new designs
  addEventListener('keydown', (e) => {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
    const keys = { '1':'liquid', '2':'kinetic', '3':'editorial', '4':'glitch', '5':'atelier' };
    if (keys[e.key]) load(keys[e.key]);
  });
})();
</script>

</body>
</html>
