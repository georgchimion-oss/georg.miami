<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factory Projects — Georg Chimion</title>
    <meta name="description" content="AI-generated web projects built by Georg's Agent Factory — an autonomous multi-agent system.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #08080A;
            --bg-2: #0F0F12;
            --bg-3: #16161B;
            --surface: #1C1C23;
            --border: rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.14);
            --text: #EAEAEF;
            --text-2: rgba(255,255,255,0.52);
            --text-3: rgba(255,255,255,0.30);
            --accent: #6366F1;
            --warm: #F0845C;
            --warm-2: #F7A87C;
            --warm-glow: rgba(240,132,92,0.10);
            --teal: #00D2C8;
            --teal-glow: rgba(0,210,200,0.10);
            --green: #10B981;
            --green-glow: rgba(16,185,129,0.10);
            --r: 14px;
            --r-sm: 8px;
        }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', -apple-system, sans-serif;
            font-weight: 400; line-height: 1.65;
        }
        a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        a:hover { color: #a5b4fc; }

        /* Grain */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        }

        /* Nav */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 18px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        nav::before {
            content: ''; position: absolute; inset: 0; z-index: -1;
            background: rgba(8,8,10,0.88); backdrop-filter: blur(24px) saturate(1.3);
        }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .nav-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
        .nav-sep { color: var(--text-3); font-weight: 300; }
        .nav-role { font-size: 13px; color: var(--text-3); font-weight: 400; }
        .nav-links { display: flex; align-items: center; gap: 28px; }
        .nav-links a { font-size: 13px; color: var(--text-2); font-weight: 400; transition: color 0.2s; }
        .nav-links a:hover { color: var(--text); }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 40px; }

        /* Header */
        .page-header {
            padding: 140px 0 60px; position: relative;
        }
        .page-header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(32px, 4vw, 48px); font-weight: 700;
            letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 16px;
        }
        .page-header .gradient {
            background: linear-gradient(135deg, var(--warm), #FF6B6B, var(--teal));
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: sunsetShift 6s ease infinite;
        }
        @keyframes sunsetShift {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .page-header p {
            font-size: 16px; color: var(--text-2); max-width: 600px; line-height: 1.7;
        }
        .page-header .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 13px; color: var(--text-3); margin-bottom: 32px;
        }
        .page-header .back-link:hover { color: var(--text-2); }

        /* Projects grid */
        .projects-section { padding: 0 0 100px; }
        .projects-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
        }
        .project-card {
            padding: 32px; background: var(--bg-2); border: 1px solid var(--border);
            border-radius: var(--r); transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .project-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
        a.project-card { cursor: pointer; text-decoration: none; color: inherit; display: block; }

        .project-card::before {
            content: ''; position: absolute; inset: 0; border-radius: var(--r);
            background: linear-gradient(135deg, rgba(240,132,92,0.03) 0%, transparent 50%);
            pointer-events: none;
        }
        .project-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent);
            transition: left 0.7s ease; pointer-events: none;
        }
        .project-card:hover::after { left: 150%; }

        .project-tag {
            display: inline-block; padding: 4px 12px; border-radius: 100px;
            font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
            margin-bottom: 14px; font-family: 'DM Sans', sans-serif;
        }
        .project-tag.factory {
            background: var(--teal-glow); color: var(--teal); border: 1px solid rgba(0,210,200,0.18);
        }
        .project-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 700;
            letter-spacing: -0.02em; margin-bottom: 8px; line-height: 1.4;
        }
        .project-desc {
            font-size: 14px; color: var(--text-2); line-height: 1.65; margin-bottom: 16px;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .project-meta {
            display: flex; align-items: center; gap: 16px;
            font-size: 12px; color: var(--text-3); font-family: 'JetBrains Mono', monospace;
        }
        .project-meta .score {
            display: inline-flex; align-items: center; gap: 4px;
            color: var(--green); font-weight: 500;
        }
        .project-link {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 14px;
            font-size: 13px; color: var(--warm); font-weight: 500;
            font-family: 'DM Sans', sans-serif; opacity: 0.7; transition: opacity 0.2s;
        }
        a.project-card:hover .project-link { opacity: 1; }

        /* Loading */
        .loading {
            text-align: center; padding: 80px 0; color: var(--text-3); font-size: 14px;
        }
        .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--warm); margin: 0 3px; animation: loadBounce 1.2s ease infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes loadBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 80px 0;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { color: var(--text-3); font-size: 15px; }

        /* Reveal animation */
        .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* Responsive */
        @media (max-width: 768px) {
            nav { padding: 14px 20px; }
            .nav-links { display: none; }
            .container { padding: 0 20px; }
            .projects-grid { grid-template-columns: 1fr; }
            .page-header { padding: 120px 0 40px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <a href="/" style="text-decoration:none;color:inherit;"><span class="nav-name">Georg Chimion</span></a>
        <span class="nav-sep">/</span>
        <span class="nav-role">Factory Projects</span>
    </div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="https://github.com/georgchimion-oss" target="_blank">GitHub</a>
    </div>
</nav>

<div class="container">
    <section class="page-header">
        <a href="/" class="back-link">&larr; georg.miami</a>
        <h1><span class="gradient">Agent Factory</span> Projects</h1>
        <p>Built autonomously by my multi-agent system. I text a PM bot on Telegram, four AI agents collaborate — planning, coding, reviewing, deploying — and a production site goes live in minutes.</p>
    </section>

    <section class="projects-section">
        <div id="projects-grid" class="projects-grid">
            <div class="loading" id="loading">
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <span class="loading-dot"></span>
                <br><br>Loading projects...
            </div>
        </div>
    </section>
</div>

<script>
    const API = 'https://api.georg.miami/factory/public/sites';

    async function loadProjects() {
        const grid = document.getElementById('projects-grid');
        const loading = document.getElementById('loading');

        try {
            const res = await fetch(API);
            const sites = await res.json();

            if (!sites.length) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">⚙</div>
                        <p>No projects built yet.<br>Text the Agent Factory bot to create one.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = sites.map((site, i) => {
                const date = new Date(site.createdAt).toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', year: 'numeric'
                });
                const delay = Math.min(i, 5);
                return `
                    <a href="${site.url}" target="_blank" class="project-card reveal" style="animation-delay:${delay * 0.08}s">
                        <div class="project-tag factory">Factory Built</div>
                        <div class="project-title">${site.name}</div>
                        <div class="project-desc">${site.brief || ''}</div>
                        <div class="project-meta">
                            <span class="score">&#9733; ${site.score}/10</span>
                            <span>${date}</span>
                        </div>
                        <div class="project-link">Visit site &#8594;</div>
                    </a>`;
            }).join('');

            // Trigger reveal animations
            requestAnimationFrame(() => {
                document.querySelectorAll('.reveal').forEach((el, i) => {
                    setTimeout(() => el.classList.add('visible'), i * 80);
                });
            });

        } catch (err) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1;">
                    <div class="icon">⚠</div>
                    <p>Couldn't load projects. Try again later.</p>
                </div>`;
        }
    }

    loadProjects();
</script>

</body>
</html>
