<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory | georg.miami</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #08080A; --surface: #111115; --border: #1E1E26;
            --warm: #F0845C; --teal: #00D2C8; --green: #10B981; --indigo: #6366F1;
            --pm: #4A9EFF; --coder: #10B981; --reviewer: #8B5CF6; --deployer: #F0845C;
        }
        body { background: var(--bg); color: #ccc; font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; }

        /* Layout */
        .layout { display: grid; grid-template-rows: 48px 1fr 220px; height: 100vh; }
        .main { display: grid; grid-template-columns: 1fr 260px; overflow: hidden; border-top: 1px solid var(--border); }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px; color: #fff; }
        .logo span { color: var(--warm); }
        .badge { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: #666; text-transform: uppercase; letter-spacing: 1px; }

        /* Office Scene */
        .office-wrap { overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background: #0a0a14; }
        .office-scene { width: 800px; height: 380px; position: relative; transform-origin: center center; flex-shrink: 0; }

        /* Wall */
        .wall { position: absolute; top: 0; left: 0; right: 0; height: 200px; background: linear-gradient(180deg, #0e0e1c 0%, #14142a 100%); border-bottom: 2px solid #222244; }
        .whiteboard { position: absolute; left: 340px; top: 30px; width: 120px; height: 70px; background: #e8e8e0; border: 3px solid #888; border-radius: 3px; }
        .whiteboard-title { font-family: 'Press Start 2P', monospace; font-size: 5px; color: #333; text-align: center; padding-top: 6px; }
        .whiteboard-content { font-family: 'JetBrains Mono', monospace; font-size: 6px; color: #555; padding: 4px 6px; line-height: 1.6; word-break: break-all; }
        .clock { position: absolute; right: 60px; top: 40px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4a4a6a; background: #0d0d1a; padding: 4px 8px; border: 1px solid #2a2a44; border-radius: 3px; }
        .poster { position: absolute; left: 60px; top: 35px; width: 50px; height: 60px; background: linear-gradient(135deg, var(--warm) 0%, var(--indigo) 100%); border: 2px solid #444; border-radius: 2px; opacity: 0.5; }

        /* Floor */
        .floor { position: absolute; bottom: 0; left: 0; right: 0; height: 180px; background: repeating-conic-gradient(#151528 0% 25%, #121222 0% 50%) 0 0 / 40px 40px; }

        /* Desks */
        .desk { position: absolute; top: 230px; width: 90px; height: 30px; background: linear-gradient(180deg, #3a2a1a 0%, #2a1e12 100%); border-radius: 3px; border: 1px solid #4a3a2a; }
        .monitor { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); width: 36px; height: 26px; background: #0a0a14; border: 2px solid #333; border-radius: 3px 3px 0 0; overflow: hidden; transition: border-color 0.5s, box-shadow 0.5s; }
        .monitor::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 8px; height: 6px; background: #333; }
        .monitor .screen { width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; }
        .monitor.active { box-shadow: 0 0 15px var(--glow); border-color: var(--glow); }
        .monitor.active .screen { opacity: 1; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.03) 2px, rgba(255,255,255,0.03) 4px); animation: screen-scroll 3s linear infinite; }
        @keyframes screen-scroll { 0% { background-position: 0 0; } 100% { background-position: 0 -40px; } }
        .chair { position: absolute; top: 268px; width: 30px; height: 20px; background: #1a1a2e; border-radius: 4px 4px 0 0; border: 1px solid #2a2a44; border-bottom: none; }
        .plant { position: absolute; font-size: 20px; filter: saturate(0.7); }

        /* Agents */
        .agent { position: absolute; text-align: center; z-index: 10; cursor: pointer; transition: left 1.4s cubic-bezier(0.25, 0.1, 0.25, 1), top 1.4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .agent:hover { filter: brightness(1.2); }
        .agent-sprite { position: relative; width: 28px; margin: 0 auto; }
        .agent-hair { width: 24px; height: 5px; margin: 0 auto; border-radius: 4px 4px 0 0; background: #333; }
        .agent-head { width: 22px; height: 18px; margin: 0 auto; background: #FFDAB9; border-radius: 3px; position: relative; }
        .agent-head::before, .agent-head::after { content: ''; position: absolute; width: 3px; height: 3px; background: #333; border-radius: 50%; top: 6px; }
        .agent-head::before { left: 5px; } .agent-head::after { right: 5px; }
        .agent-mouth { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 6px; height: 2px; border-radius: 0 0 3px 3px; background: #c9967a; }
        .agent-body { width: 24px; height: 16px; margin: 0 auto; border-radius: 2px; }
        .agent-legs { display: flex; justify-content: center; gap: 4px; }
        .agent-leg { width: 7px; height: 10px; background: #2a2a3e; border-radius: 0 0 2px 2px; }
        .agent-name { font-family: 'Press Start 2P', monospace; font-size: 6px; margin-top: 4px; color: #888; letter-spacing: 0.5px; }

        .agent.idle .agent-sprite { animation: idle-bob 3s ease-in-out infinite; }
        .agent.working .agent-sprite { animation: typing 0.3s ease-in-out infinite; }
        .agent.celebrating .agent-sprite { animation: celebrate 0.35s ease-in-out infinite; }
        .agent.done .agent-sprite { animation: none; }
        @keyframes idle-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
        @keyframes typing { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-1px) rotate(1deg); } }
        @keyframes celebrate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .speech-bubble { position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #fff; color: #111; font-family: 'DM Sans', sans-serif; font-size: 9px; padding: 5px 8px; border-radius: 6px; pointer-events: none; opacity: 0; transform: translateX(-50%) translateY(5px) scale(0.9); transition: opacity 0.3s, transform 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.4); max-width: 160px; white-space: normal; text-align: center; line-height: 1.3; z-index: 20; }
        .speech-bubble::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #fff; }
        .speech-bubble.visible { opacity: 1; transform: translateX(-50%) translateY(-6px) scale(1); }

        .agent-status-dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; border-radius: 50%; background: #333; border: 1px solid #0a0a14; transition: background 0.3s; }
        .agent.working .agent-status-dot { background: var(--warm); animation: pulse-dot 1s infinite; }
        .agent.done .agent-status-dot { background: var(--green); }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .confetti { position: absolute; width: 6px; height: 6px; top: -10px; border-radius: 1px; z-index: 100; pointer-events: none; animation: confetti-fall linear forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(400px) rotate(720deg); opacity: 0; } }

        /* Sidebar */
        .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600; padding: 12px 14px; border-bottom: 1px solid var(--border); color: #fff; }
        .activity-feed { flex: 1; overflow-y: auto; padding: 8px 0; scrollbar-width: thin; scrollbar-color: #2a2a3e transparent; }
        .activity-item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 14px; font-size: 11px; line-height: 1.4; }
        .activity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .activity-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #555; flex-shrink: 0; width: 55px; }
        .activity-text { color: #999; }

        /* Bottom Panel — Tabs */
        .bottom-panel { background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .panel-tab { background: none; border: none; color: #666; font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
        .panel-tab:hover { color: #aaa; }
        .panel-tab.active { color: #fff; border-bottom-color: var(--warm); }
        .tab-content { flex: 1; overflow: hidden; display: none; }
        .tab-content.active { display: flex; flex-direction: column; }

        /* Chat tab */
        .chat-log { flex: 1; overflow-y: auto; padding: 10px 16px; scrollbar-width: thin; scrollbar-color: #2a2a3e transparent; }
        .chat-msg { margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
        .chat-msg .msg-sender { font-weight: 600; margin-right: 6px; font-size: 12px; }
        .chat-msg .msg-text { color: #bbb; }
        .chat-msg .msg-text a { color: var(--teal); text-decoration: none; }
        .chat-msg .msg-text a:hover { text-decoration: underline; }
        .chat-msg.user { text-align: right; }
        .chat-msg.user .msg-sender { color: var(--teal); }
        .chat-msg.system .msg-sender { color: #666; }
        .telegram-notice { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #555; }
        .btn-build { background: linear-gradient(135deg, var(--warm), #e06a3c); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: transform 0.15s, opacity 0.15s; white-space: nowrap; }
        .btn-build:hover { transform: translateY(-1px); }
        .btn-build:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Console tab */
        .console-log { flex: 1; overflow-y: auto; padding: 10px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.6; scrollbar-width: thin; scrollbar-color: #2a2a3e transparent; }
        .console-entry { margin-bottom: 2px; white-space: pre-wrap; word-break: break-all; }
        .console-prefix { font-weight: 500; }

        .inline-btn { background: var(--surface); border: 1px solid var(--border); color: #fff; padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; margin: 2px; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
        .inline-btn:hover { background: #1a1a24; }

        /* Live URL banner */
        .live-url-banner { display: none; padding: 8px 16px; background: linear-gradient(135deg, rgba(16,185,129,0.1), rgba(0,210,200,0.1)); border-top: 1px solid rgba(16,185,129,0.2); text-align: center; font-size: 12px; flex-shrink: 0; }
        .live-url-banner a { color: var(--teal); font-weight: 600; text-decoration: none; }
        .live-url-banner a:hover { text-decoration: underline; }
        .live-url-banner.visible { display: block; }

        /* Preview Modal */
        .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; flex-direction: column; }
        .preview-modal.visible { display: flex; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-family: 'Space Grotesk', sans-serif; font-size: 15px; color: #fff; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions button { background: var(--bg); border: 1px solid var(--border); color: #ccc; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
        .modal-actions button:hover { background: #1a1a24; }
        .modal-actions .btn-primary { background: var(--warm); border-color: var(--warm); color: #fff; }
        .preview-frame { flex: 1; border: none; background: #fff; }

        /* Agent Info Modal */
        .agent-info-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; display: none; align-items: center; justify-content: center; }
        .agent-info-modal.visible { display: flex; }
        .agent-info-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .agent-info-card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: #fff; margin-bottom: 4px; }
        .agent-info-card .agent-role { color: #888; font-size: 13px; margin-bottom: 16px; }
        .agent-info-card h4 { font-family: 'Space Grotesk', sans-serif; font-size: 13px; color: #999; margin: 12px 0 6px; text-transform: uppercase; letter-spacing: 1px; }
        .agent-info-card ul { list-style: none; padding: 0; }
        .agent-info-card li { padding: 3px 0; font-size: 13px; color: #bbb; }
        .agent-info-card li::before { content: '→ '; color: #555; }
        .agent-info-card .prompt-preview { background: #0a0a14; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #888; line-height: 1.5; max-height: 200px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
        .agent-info-card .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #555; margin-top: 12px; }
        .agent-info-close { background: none; border: 1px solid var(--border); color: #888; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; float: right; }
        .agent-info-close:hover { color: #fff; border-color: #444; }
    </style>
</head>
<body>
    <div class="layout">
        <header class="header">
            <div class="logo">⚙ Agent <span>Factory</span></div>
            <div class="badge" id="status-badge">IDLE</div>
        </header>

        <div class="main">
            <div class="office-wrap">
                <div class="office-scene" id="office">
                    <div class="wall">
                        <div class="poster"></div>
                        <div class="whiteboard"><div class="whiteboard-title">PROJECT PLAN</div><div class="whiteboard-content" id="wb-content">Waiting for brief...</div></div>
                        <div class="clock" id="clock">00:00</div>
                    </div>
                    <div class="floor"></div>
                    <div class="plant" style="left:12px;top:195px;">🌿</div><div class="plant" style="left:758px;top:195px;">🌿</div>
                    <div class="plant" style="left:12px;top:330px;">🪴</div><div class="plant" style="left:758px;top:330px;">🪴</div>

                    <div class="desk" style="left:68px;"><div class="monitor" id="monitor-pm" style="--glow:var(--pm)"><div class="screen"></div></div></div><div class="chair" style="left:98px;"></div>
                    <div class="desk" style="left:248px;"><div class="monitor" id="monitor-coder" style="--glow:var(--coder)"><div class="screen"></div></div></div><div class="chair" style="left:278px;"></div>
                    <div class="desk" style="left:428px;"><div class="monitor" id="monitor-reviewer" style="--glow:var(--reviewer)"><div class="screen"></div></div></div><div class="chair" style="left:458px;"></div>
                    <div class="desk" style="left:608px;"><div class="monitor" id="monitor-deployer" style="--glow:var(--deployer)"><div class="screen"></div></div></div><div class="chair" style="left:638px;"></div>

                    <div class="agent idle" id="agent-pm" style="left:98px;top:268px;" onclick="showAgentInfo('pm')">
                        <div class="speech-bubble" id="bubble-pm"></div>
                        <div class="agent-sprite"><div class="agent-status-dot"></div><div class="agent-hair" style="background:#2a1a0a;"></div><div class="agent-head"><div class="agent-mouth"></div></div><div class="agent-body" style="background:var(--pm);"></div><div class="agent-legs"><div class="agent-leg"></div><div class="agent-leg"></div></div></div>
                        <div class="agent-name" style="color:var(--pm);">PM</div>
                    </div>
                    <div class="agent idle" id="agent-coder" style="left:278px;top:268px;" onclick="showAgentInfo('coder')">
                        <div class="speech-bubble" id="bubble-coder"></div>
                        <div class="agent-sprite"><div class="agent-status-dot"></div><div class="agent-hair" style="background:#1a3320;"></div><div class="agent-head"><div class="agent-mouth"></div></div><div class="agent-body" style="background:var(--coder);"></div><div class="agent-legs"><div class="agent-leg"></div><div class="agent-leg"></div></div></div>
                        <div class="agent-name" style="color:var(--coder);">CODER</div>
                    </div>
                    <div class="agent idle" id="agent-reviewer" style="left:458px;top:268px;" onclick="showAgentInfo('reviewer')">
                        <div class="speech-bubble" id="bubble-reviewer"></div>
                        <div class="agent-sprite"><div class="agent-status-dot"></div><div class="agent-hair" style="background:#2a1a3a;"></div><div class="agent-head"><div class="agent-mouth"></div></div><div class="agent-body" style="background:var(--reviewer);"></div><div class="agent-legs"><div class="agent-leg"></div><div class="agent-leg"></div></div></div>
                        <div class="agent-name" style="color:var(--reviewer);">REVIEW</div>
                    </div>
                    <div class="agent idle" id="agent-deployer" style="left:638px;top:268px;" onclick="showAgentInfo('deployer')">
                        <div class="speech-bubble" id="bubble-deployer"></div>
                        <div class="agent-sprite"><div class="agent-status-dot"></div><div class="agent-hair" style="background:#3a2010;"></div><div class="agent-head"><div class="agent-mouth"></div></div><div class="agent-body" style="background:var(--deployer);"></div><div class="agent-legs"><div class="agent-leg"></div><div class="agent-leg"></div></div></div>
                        <div class="agent-name" style="color:var(--deployer);">DEPLOY</div>
                    </div>
                </div>
            </div>
            <div class="sidebar">
                <div class="sidebar-title">Activity</div>
                <div class="activity-feed" id="activity-feed"></div>
            </div>
        </div>

        <!-- Bottom Panel: Chat + Console tabs -->
        <div class="bottom-panel">
            <div class="panel-tabs">
                <button class="panel-tab active" data-tab="chat" onclick="switchTab('chat')">💬 Chat</button>
                <button class="panel-tab" data-tab="console" onclick="switchTab('console')">🖥 Console</button>
            </div>
            <div class="live-url-banner" id="live-url-banner"></div>
            <div class="tab-content active" id="tab-chat">
                <div class="chat-log" id="chat-log">
                    <div class="chat-msg system"><span class="msg-sender">⚙ Factory</span><span class="msg-text">Watch the agents build in real-time. Conversations happen via Telegram — this is a live feed. Click any agent to see their profile.</span></div>
                </div>
            </div>
            <div class="tab-content" id="tab-console">
                <div class="console-log" id="console-log"></div>
            </div>
            <div class="telegram-notice">
                <span>Live feed — conversations happen via Telegram</span>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="preview-modal">
        <div class="modal-header">
            <h3 id="preview-title">Preview</h3>
            <div class="modal-actions">
                <button onclick="downloadBuild()">💾 Download</button>
                <button onclick="copyHtml()">📋 Copy</button>
                <button class="btn-primary" onclick="closePreview()">Close</button>
            </div>
        </div>
        <iframe class="preview-frame" id="preview-frame"></iframe>
    </div>

    <!-- Agent Info Modal -->
    <div class="agent-info-modal" id="agent-info-modal" onclick="if(event.target===this)closeAgentInfo()">
        <div class="agent-info-card" id="agent-info-card"></div>
    </div>

    <script>
    const TOKEN = new URLSearchParams(window.location.search).get('token');
    const AGENTS = {
        pm:       { name: 'PM',       color: '#4A9EFF', emoji: '📋', home: [98, 268] },
        coder:    { name: 'Coder',    color: '#10B981', emoji: '💻', home: [278, 268] },
        reviewer: { name: 'Reviewer', color: '#8B5CF6', emoji: '🔍', home: [458, 268] },
        deployer: { name: 'Deployer', color: '#F0845C', emoji: '🚀', home: [638, 268] },
    };
    const TARGETS = { whiteboard: [370, 140], pm: [98, 268], coder: [258, 268], reviewer: [438, 268], deployer: [618, 268] };

    let currentBuildId = null, building = false, lastBuildHtml = null, lastBuildPlan = null, lastSiteUrl = null;
    let agentInfoCache = null;

    // ---- Clock ----
    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    setInterval(updateClock, 10000); updateClock();

    // ---- Tabs ----
    function switchTab(tab) {
        document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));
    }

    // ---- SSE ----
    function connectSSE() {
        const es = new EventSource('https://api.georg.miami/factory/api/stream?token=' + TOKEN);
        es.onmessage = e => handleEvent(JSON.parse(e.data));
        es.onerror = () => addActivity('system', 'Reconnecting...');
    }

    function handleEvent(evt) {
        switch (evt.type) {
            case 'connected': addActivity('system', 'Connected to factory'); break;
            case 'build_started':
                currentBuildId = evt.buildId;
                lastSiteUrl = null;
                building = true;
                setBadge(evt.modify ? 'MODIFYING' : 'BUILDING', '#F0845C');
                document.getElementById('live-url-banner').classList.remove('visible');
                if (!evt.modify) {
                    clearConsole();
                    document.getElementById('wb-content').textContent = 'Planning...';
                }
                break;
            case 'agent_status': setAgentStatus(evt.agent, evt.status, evt.message); break;
            case 'agent_move': moveAgent(evt.agent, evt.target); break;
            case 'chat_message': addChat(evt.agent, evt.message); break;
            case 'console_log': addConsoleEntry(evt.agent, evt.message); break;
            case 'task_created':
                if (evt.plan) {
                    lastBuildPlan = evt.plan;
                    const sections = evt.plan.sections || [];
                    const names = sections.map(s => typeof s === 'string' ? s : s.name);
                    document.getElementById('wb-content').textContent = names.join(', ');
                }
                break;
            case 'code_generated': addActivity('coder', 'HTML generated'); break;
            case 'review_result':
                addActivity('reviewer', 'Score: ' + evt.score + '/10 — ' + (evt.passed ? 'Passed' : 'Needs revision'));
                break;
            case 'build_complete':
                currentBuildId = evt.buildId;
                lastBuildPlan = evt.plan;
                lastSiteUrl = evt.siteUrl;
                showBuildComplete(evt);
                break;
            case 'celebrate':
                celebrate();
                setBadge('COMPLETE', '#10B981');
                setTimeout(() => { building = false; }, 3000);
                break;
            case 'error':
                addChat('system', 'Error: ' + evt.message);
                addConsoleEntry('system', 'ERROR: ' + evt.message);
                setBadge('ERROR', '#EF4444');
                building = false;
                break;
        }
    }

    // ---- Agent control ----
    function moveAgent(id, target) {
        const el = document.getElementById('agent-' + id);
        if (!el) return;
        const pos = TARGETS[target] || AGENTS[id]?.home;
        if (pos) { el.style.left = pos[0] + 'px'; el.style.top = pos[1] + 'px'; }
    }

    function setAgentStatus(id, status, message) {
        const el = document.getElementById('agent-' + id);
        if (!el) return;
        el.className = 'agent ' + status;
        const bubble = document.getElementById('bubble-' + id);
        if (message) { bubble.textContent = message; bubble.classList.add('visible'); }
        else { bubble.classList.remove('visible'); }
        const monitor = document.getElementById('monitor-' + id);
        if (monitor) { status === 'working' ? monitor.classList.add('active') : monitor.classList.remove('active'); }
        if (message) addActivity(id, message);
    }

    function celebrate() {
        const office = document.getElementById('office');
        const colors = ['#F0845C','#00D2C8','#10B981','#6366F1','#4A9EFF','#8B5CF6','#FFD700'];
        for (let i = 0; i < 60; i++) {
            const c = document.createElement('div'); c.className = 'confetti';
            c.style.left = Math.random()*100+'%'; c.style.background = colors[Math.floor(Math.random()*colors.length)];
            c.style.animationDelay = (Math.random()*0.6)+'s'; c.style.animationDuration = (1.5+Math.random())+'s';
            c.style.width = (4+Math.random()*6)+'px'; c.style.height = (4+Math.random()*6)+'px';
            office.appendChild(c); setTimeout(() => c.remove(), 4000);
        }
        document.querySelectorAll('.agent').forEach(a => {
            a.classList.add('celebrating');
            setTimeout(() => { a.classList.remove('celebrating'); a.classList.add('idle'); }, 3500);
        });
    }

    // ---- Chat ----
    function addChat(agent, text) {
        const log = document.getElementById('chat-log');
        const msg = document.createElement('div');
        const isUser = agent === 'user', isSystem = agent === 'system';
        const info = isUser ? { name: 'You', color: '#00D2C8', emoji: '👤' }
                   : isSystem ? { name: 'Factory', color: '#666', emoji: '⚙' }
                   : (AGENTS[agent] || { name: agent, color: '#666', emoji: '🤖' });
        msg.className = 'chat-msg ' + agent;
        msg.innerHTML = '<span class="msg-sender" style="color:'+info.color+'">'+info.emoji+' '+info.name+'</span><span class="msg-text">'+text+'</span>';
        log.appendChild(msg); log.scrollTop = log.scrollHeight;
    }

    function addActivity(agent, text) {
        const feed = document.getElementById('activity-feed');
        const item = document.createElement('div');
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const info = AGENTS[agent] || { color: '#444' };
        item.className = 'activity-item';
        item.innerHTML = '<span class="activity-dot" style="background:'+info.color+'"></span><span class="activity-time">'+time+'</span><span class="activity-text">'+text+'</span>';
        feed.appendChild(item); feed.scrollTop = feed.scrollHeight;
    }

    // ---- Console ----
    function addConsoleEntry(agent, message) {
        const log = document.getElementById('console-log');
        const entry = document.createElement('div');
        entry.className = 'console-entry';
        const info = AGENTS[agent] || { name: agent, color: '#666' };
        const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        // Truncate very long messages (like full HTML)
        const truncated = message.length > 2000 ? message.substring(0, 2000) + '\n... (' + message.length + ' chars total)' : message;
        entry.innerHTML = '<span style="color:#555">['+time+']</span> <span class="console-prefix" style="color:'+info.color+'">['+info.name.toUpperCase()+']</span> ' + escapeHtml(truncated);
        log.appendChild(entry); log.scrollTop = log.scrollHeight;
    }

    function clearConsole() {
        document.getElementById('console-log').innerHTML = '';
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    // Input removed — conversations happen via Telegram

    function showBuildComplete(evt) {
        const urlHtml = evt.siteUrl
            ? ' <a href="'+evt.siteUrl+'" target="_blank">'+evt.siteUrl+'</a>'
            : '';
        addChat('system', '🎉 Build complete!' + urlHtml +
            ' <button class="inline-btn" onclick="previewBuild()">👁 Preview</button>' +
            ' <button class="inline-btn" onclick="downloadBuild()">💾 Download</button>'
        );
        if (evt.siteUrl) {
            const banner = document.getElementById('live-url-banner');
            banner.innerHTML = '🚀 Live at: <a href="'+evt.siteUrl+'" target="_blank">'+evt.siteUrl+'</a>';
            banner.classList.add('visible');
        }
    }

    async function previewBuild() {
        if (!currentBuildId) return;
        try {
            const res = await fetch('https://api.georg.miami/factory/api/build/'+currentBuildId+'?token='+TOKEN);
            const data = await res.json();
            lastBuildHtml = data.html; lastBuildPlan = data.plan;
            document.getElementById('preview-title').textContent = 'Preview — '+(data.plan?.projectName||'Build');
            document.getElementById('preview-frame').srcdoc = data.html;
            document.getElementById('preview-modal').classList.add('visible');
        } catch(err) { addChat('system','Preview failed: '+err.message); }
    }

    function downloadBuild() {
        if (lastBuildHtml) { doDownload(lastBuildHtml, lastBuildPlan?.repoName||'site'); return; }
        if (!currentBuildId) return;
        fetch('https://api.georg.miami/factory/api/build/'+currentBuildId+'?token='+TOKEN).then(r=>r.json()).then(d=>{ lastBuildHtml=d.html; doDownload(d.html, d.plan?.repoName||'site'); });
    }
    function doDownload(html, name) { const b=new Blob([html],{type:'text/html'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=name+'.html'; a.click(); URL.revokeObjectURL(u); }
    function copyHtml() { if(!lastBuildHtml)return; navigator.clipboard.writeText(lastBuildHtml).then(()=>addChat('system','Copied!')); }
    function closePreview() { document.getElementById('preview-modal').classList.remove('visible'); document.getElementById('preview-frame').srcdoc=''; }

    // ---- Agent Info ----
    async function showAgentInfo(id) {
        if (!agentInfoCache) {
            try {
                const res = await fetch('https://api.georg.miami/factory/api/agents?token='+TOKEN);
                agentInfoCache = await res.json();
            } catch { agentInfoCache = []; }
        }
        const agent = agentInfoCache.find(a => a.id === id);
        if (!agent) return;
        const card = document.getElementById('agent-info-card');
        card.innerHTML = `
            <button class="agent-info-close" onclick="closeAgentInfo()">Close</button>
            <h2 style="color:${agent.color}">${agent.emoji} ${agent.name}</h2>
            <div class="agent-role">${agent.description}</div>
            <h4>Capabilities</h4>
            <ul>${agent.capabilities.map(c => '<li>'+c+'</li>').join('')}</ul>
            <h4>System Prompt</h4>
            <div class="prompt-preview">${escapeHtml(agent.systemPrompt || 'No prompt (uses shell commands)')}</div>
            <div class="meta">Model: ${agent.model} · Max tokens: ${agent.maxTokens.toLocaleString()}</div>
        `;
        document.getElementById('agent-info-modal').classList.add('visible');
    }
    function closeAgentInfo() { document.getElementById('agent-info-modal').classList.remove('visible'); }

    // ---- UI helpers ----
    function setBadge(text, color) { const b=document.getElementById('status-badge'); b.textContent=text; b.style.background=color+'18'; b.style.color=color; b.style.borderColor=color+'44'; }
    function scaleOffice() { const w=document.querySelector('.office-wrap'), s=document.getElementById('office'); if(!w||!s)return; const sc=Math.min(w.clientWidth/800, w.clientHeight/380, 1.8); s.style.transform='scale('+sc+')'; }

    // ---- Init ----
    window.addEventListener('resize', scaleOffice); scaleOffice();
    connectSSE();
    addActivity('system', 'Factory online — talk to PM to get started');
    </script>
</body>
</html>
