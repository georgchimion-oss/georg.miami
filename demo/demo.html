<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Factory Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0e0e0e; overflow: hidden; height: 100vh; display: flex; }

        .left { flex: 6; border-right: 2px solid #1a1a1a; position: relative; }
        .left iframe { width: 100%; height: 100%; border: none; }
        .right { flex: 4; display: flex; flex-direction: column; background: #17212b; }

        .tg-header {
            padding: 12px 16px; background: #1c2733; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid #0e1621;
        }
        .tg-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #F0845C, #10B981);
            display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff;
        }
        .tg-info { flex: 1; }
        .tg-name { font-family: -apple-system, sans-serif; font-size: 15px; font-weight: 600; color: #fff; }
        .tg-status { font-size: 12px; color: #6d8da4; }

        .tg-chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }

        .msg {
            max-width: 85%; padding: 8px 12px; border-radius: 12px; font-family: -apple-system, sans-serif;
            font-size: 14px; line-height: 1.45; animation: msgIn 0.3s ease; word-wrap: break-word;
        }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: #2b5278; color: #fff; border-bottom-right-radius: 4px; }
        .msg.bot { align-self: flex-start; background: #1e2c3a; color: #e4e6eb; border-bottom-left-radius: 4px; }
        .msg .time { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; text-align: right; }
        .msg a { color: #5baaec; }

        .typing { align-self: flex-start; padding: 10px 16px; background: #1e2c3a; border-radius: 12px; display: none; gap: 4px; align-items: center; }
        .typing.visible { display: flex; }
        .typing span { width: 7px; height: 7px; border-radius: 50%; background: #6d8da4; animation: typeDot 1.2s ease infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typeDot { 0%,100%{opacity:0.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }

        .tg-input { padding: 10px 16px; background: #17212b; border-top: 1px solid #0e1621; display: flex; align-items: center; gap: 10px; }
        .tg-input input {
            flex: 1; background: #242f3d; border: none; border-radius: 20px;
            padding: 10px 16px; color: #fff; font-size: 14px; font-family: -apple-system, sans-serif; outline: none;
        }
        .tg-input input::placeholder { color: #6d8da4; }
        .tg-input .send-btn {
            width: 36px; height: 36px; border-radius: 50%; background: #5baaec;
            border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .tg-input .send-btn svg { fill: #fff; width: 16px; height: 16px; }
    </style>
</head>
<body>

<div class="left">
    <iframe id="factory-frame" src="about:blank"></iframe>
</div>

<div class="right">
    <div class="tg-header">
        <div class="tg-avatar">P</div>
        <div class="tg-info">
            <div class="tg-name">Ask Penny</div>
            <div class="tg-status" id="tg-status">bot</div>
        </div>
    </div>
    <div class="tg-chat" id="tg-chat">
        <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="tg-input">
        <input type="text" id="tg-input" placeholder="Write a message..." readonly>
        <button class="send-btn"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
</div>

<script>
    // This demo is driven by Playwright — it calls window.demoStep() to advance
    const FACTORY_URL = 'https://api.georg.miami/factory';
    const TOKEN = '0394108422d56aa17dedeb9dc2b99c18';

    const chat = document.getElementById('tg-chat');
    const typing = document.getElementById('typing');
    const input = document.getElementById('tg-input');
    const statusEl = document.getElementById('tg-status');
    const frame = document.getElementById('factory-frame');

    function now() {
        return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    window.addBotMsg = function(text) {
        typing.classList.remove('visible');
        statusEl.textContent = 'bot';
        const div = document.createElement('div');
        div.className = 'msg bot';
        div.innerHTML = text + `<div class="time">${now()}</div>`;
        chat.insertBefore(div, typing);
        chat.scrollTop = chat.scrollHeight;
    };

    window.addUserMsg = function(text) {
        const div = document.createElement('div');
        div.className = 'msg user';
        div.innerHTML = text + `<div class="time">${now()}</div>`;
        chat.insertBefore(div, typing);
        chat.scrollTop = chat.scrollHeight;
    };

    window.showTyping = function(show) {
        typing.classList.toggle('visible', show);
        statusEl.textContent = show ? 'typing...' : 'bot';
        chat.scrollTop = chat.scrollHeight;
    };

    window.setInput = function(text) {
        input.value = text;
    };

    window.loadFactory = function() {
        frame.src = `${FACTORY_URL}?token=${TOKEN}`;
    };

    window.loadSite = function(url) {
        frame.src = url;
    };
</script>

</body>
</html>
